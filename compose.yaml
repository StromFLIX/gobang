name: gobang

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  pocketbase:
    build:
      context: ./pocketbase
      args:
        PB_VERSION: 0.39.6
    environment:
      PB_SUPERUSER_EMAIL: ${PB_SUPERUSER_EMAIL:?Set PB_SUPERUSER_EMAIL}
      PB_SUPERUSER_PASSWORD: ${PB_SUPERUSER_PASSWORD:?Set PB_SUPERUSER_PASSWORD}
      PB_APP_NAME: '${PB_APP_NAME:-Gobang}'
      PB_APP_URL: '${PB_APP_URL:-}'
      PB_MAIL_SENDER_NAME: '${PB_MAIL_SENDER_NAME:-Gobang}'
      PB_MAIL_SENDER_ADDRESS: '${PB_MAIL_SENDER_ADDRESS:-}'
      PB_SMTP_ENABLED: '${PB_SMTP_ENABLED:-false}'
      PB_SMTP_HOST: '${PB_SMTP_HOST:-}'
      PB_SMTP_PORT: '${PB_SMTP_PORT:-587}'
      PB_SMTP_USERNAME: '${PB_SMTP_USERNAME:-}'
      PB_SMTP_PASSWORD: '${PB_SMTP_PASSWORD:-}'
      PB_SMTP_AUTH_METHOD: '${PB_SMTP_AUTH_METHOD:-PLAIN}'
      PB_SMTP_TLS: '${PB_SMTP_TLS:-false}'
      PB_SMTP_LOCAL_NAME: '${PB_SMTP_LOCAL_NAME:-}'
      PB_GOOGLE_AUTH_ENABLED: '${PB_GOOGLE_AUTH_ENABLED:-false}'
      PB_GOOGLE_CLIENT_ID: '${PB_GOOGLE_CLIENT_ID:-}'
      PB_GOOGLE_CLIENT_SECRET: '${PB_GOOGLE_CLIENT_SECRET:-}'
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - pocketbase_data:/pb/pb_data

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_LEGAL_OPERATOR_NAME: ${LEGAL_OPERATOR_NAME:-}
        VITE_LEGAL_COUNTRY: ${LEGAL_COUNTRY:-}
        VITE_LEGAL_EMAIL: ${LEGAL_EMAIL:-}
        VITE_LEGAL_REGISTER_ENTRY: ${LEGAL_REGISTER_ENTRY:-}
        VITE_LEGAL_VAT_ID: ${LEGAL_VAT_ID:-}
        VITE_LEGAL_HOSTING_PROVIDER: ${LEGAL_HOSTING_PROVIDER:-}
        VITE_LEGAL_HOSTING_LOCATION: ${LEGAL_HOSTING_LOCATION:-}
    environment:
      POCKETBASE_URL: http://pocketbase:8090
      PB_SUPERUSER_EMAIL: ${PB_SUPERUSER_EMAIL:?Set PB_SUPERUSER_EMAIL}
      PB_SUPERUSER_PASSWORD: ${PB_SUPERUSER_PASSWORD:?Set PB_SUPERUSER_PASSWORD}
      FRONTEND_DIST: /app/frontend_dist
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
      LEGAL_STREET_ADDRESS: ${LEGAL_STREET_ADDRESS:-}
      LEGAL_POSTAL_CITY: ${LEGAL_POSTAL_CITY:-}
      ANDROID_APP_LINK_SHA256_CERT_FINGERPRINTS: ${ANDROID_APP_LINK_SHA256_CERT_FINGERPRINTS:-04:3F:9D:9A:92:E2:40:7A:F0:A3:46:B0:5B:3D:4C:72:47:C7:D7:95:BE:55:2C:75:1B:A7:13:3F:CD:7B:25:BC}
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  caddy:
    build:
      context: .
      dockerfile: Caddy.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      app:
        condition: service_healthy
      pocketbase:
        condition: service_healthy
    expose:
      - '80'

volumes:
  pocketbase_data:
