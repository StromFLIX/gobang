name: Android release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish Android release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Validate release secrets
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for variable in \
            GOOGLE_SERVICES_JSON_BASE64 \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD
          do
            if [[ -z "${!variable}" ]]; then
              echo "Missing GitHub Actions secret: ${variable}" >&2
              exit 1
            fi
          done

      - name: Restore Android credentials
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/gobang-release.jks"

      - name: Validate public legal configuration
        env:
          LEGAL_OPERATOR_NAME: ${{ vars.LEGAL_OPERATOR_NAME }}
          LEGAL_COUNTRY: ${{ vars.LEGAL_COUNTRY }}
          LEGAL_EMAIL: ${{ vars.LEGAL_EMAIL }}
          LEGAL_HOSTING_PROVIDER: ${{ vars.LEGAL_HOSTING_PROVIDER }}
          LEGAL_HOSTING_LOCATION: ${{ vars.LEGAL_HOSTING_LOCATION }}
        run: |
          for variable in \
            LEGAL_OPERATOR_NAME \
            LEGAL_COUNTRY \
            LEGAL_EMAIL \
            LEGAL_HOSTING_PROVIDER \
            LEGAL_HOSTING_LOCATION
          do
            if [[ -z "${!variable}" ]]; then
              echo "Missing GitHub Actions variable: ${variable}" >&2
              exit 1
            fi
          done

      - name: Build signed Android release
        env:
          VITE_API_BASE_URL: ${{ vars.ANDROID_API_BASE_URL || 'https://gobang.stromflix.com' }}
          VITE_LEGAL_OPERATOR_NAME: ${{ vars.LEGAL_OPERATOR_NAME }}
          VITE_LEGAL_COUNTRY: ${{ vars.LEGAL_COUNTRY }}
          VITE_LEGAL_EMAIL: ${{ vars.LEGAL_EMAIL }}
          VITE_LEGAL_REGISTER_ENTRY: ${{ vars.LEGAL_REGISTER_ENTRY }}
          VITE_LEGAL_VAT_ID: ${{ vars.LEGAL_VAT_ID }}
          VITE_LEGAL_HOSTING_PROVIDER: ${{ vars.LEGAL_HOSTING_PROVIDER }}
          VITE_LEGAL_HOSTING_LOCATION: ${{ vars.LEGAL_HOSTING_LOCATION }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: 1.0.${{ github.run_number }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/gobang-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npm run android:release

      - name: Verify and stage Android release
        run: |
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs \
            android/app/build/outputs/apk/release/app-release.apk
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/gobang-android.apk
          cp android/app/build/outputs/bundle/release/app-release.aab release/gobang-android.aab
          sha256sum release/gobang-android.apk > release/gobang-android.apk.sha256
          sha256sum release/gobang-android.aab > release/gobang-android.aab.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gobang-android-${{ github.run_number }}
          path: |
            release/gobang-android.apk
            release/gobang-android.apk.sha256
            release/gobang-android.aab
            release/gobang-android.aab.sha256
          retention-days: 30
          if-no-files-found: error

      - name: Publish rolling GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag --force android-latest "$GITHUB_SHA"
          git push origin refs/tags/android-latest --force

          release_notes=$(cat <<EOF
          Automated Android build from commit ${GITHUB_SHA}.

          Version: 1.0.${GITHUB_RUN_NUMBER} (${GITHUB_RUN_NUMBER})
          Backend: ${{ vars.ANDROID_API_BASE_URL || 'https://gobang.stromflix.com' }}

          The APK is for direct installation. The AAB is the Google Play upload artifact.
          EOF
          )

          if gh release view android-latest >/dev/null 2>&1; then
            gh release edit android-latest \
              --title "Gobang Android (latest)" \
              --notes "$release_notes"
          else
            gh release create android-latest \
              --title "Gobang Android (latest)" \
              --notes "$release_notes"
          fi

          gh release upload android-latest \
            release/gobang-android.apk \
            release/gobang-android.apk.sha256 \
            release/gobang-android.aab \
            release/gobang-android.aab.sha256 \
            --clobber
